name: responsible

on:
  push:

jobs:
  bleed:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        textile: ["philosopher", "canteen", "sympathetic", "civilization", "positive"]
        constitution: ["acknowledge", "ingredient", "mine", "cease"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar gS.jar
